<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제로 콜라 최저가 검색</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
    header { background: #1a1a2e; color: #fff; padding: 20px; text-align: center; }
    header h1 { font-size: 1.6rem; }
    header p { font-size: 0.9rem; opacity: 0.7; margin-top: 4px; }
    .search-bar { display: flex; justify-content: center; padding: 24px 16px; gap: 8px; }
    .search-bar input { width: 100%; max-width: 420px; padding: 12px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
    .search-bar button { padding: 12px 24px; background: #e84393; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .search-bar button:hover { background: #c2185b; }
    #status { text-align: center; color: #666; margin-bottom: 12px; font-size: 0.9rem; }
    #error { text-align: center; color: #c62828; background: #ffebee; border: 1px solid #ef9a9a; border-radius: 8px; padding: 12px 16px; margin: 0 16px 16px; display: none; }
    #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; padding: 0 16px 32px; max-width: 1100px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform .15s; }
    .card:hover { transform: translateY(-3px); }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .card-body { padding: 12px; }
    .card-title { font-size: 0.85rem; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-price { font-size: 1.2rem; font-weight: 700; color: #e84393; }
    .card-mall { font-size: 0.75rem; color: #999; margin-top: 4px; }
    .card-link { display: block; margin-top: 10px; text-align: center; padding: 8px; background: #1a1a2e; color: #fff; border-radius: 6px; text-decoration: none; font-size: 0.85rem; }
    .card-link:hover { background: #e84393; }
  </style>
</head>
<body>
  <header>
    <h1>🥤 제로 콜라 최저가 검색</h1>
    <p>네이버 쇼핑 기준 실시간 가격 비교</p>
  </header>

  <div class="search-bar">
    <input type="text" id="query" value="제로콜라" placeholder="검색어 입력">
    <button onclick="doSearch()">검색</button>
  </div>

  <div id="status"></div>
  <div id="error"></div>
  <div id="results"></div>

  <script>
    async function doSearch() {
      const q = document.getElementById('query').value.trim();
      if (!q) return;
      const status = document.getElementById('status');
      const errorEl = document.getElementById('error');
      const results = document.getElementById('results');

      status.textContent = '검색 중...';
      errorEl.style.display = 'none';
      results.innerHTML = '';

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&n=40`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `HTTP ${res.status}`);
        }
        const data = await res.json();
        const items = (data.items || []).filter(it => it.lprice > 0);
        items.sort((a, b) => Number(a.lprice) - Number(b.lprice));
        status.textContent = `${items.length}개 결과 (가격 오름차순)`;
        if (items.length === 0) {
          results.innerHTML = '<p style="text-align:center;color:#999;padding:32px">결과가 없습니다.</p>';
          return;
        }
        results.innerHTML = items.map(it => `
          <div class="card">
            <img src="${it.image}" alt="" loading="lazy" onerror="this.style.display='none'">
            <div class="card-body">
              <div class="card-title">${it.title.replace(/<[^>]+>/g, '')}</div>
              <div class="card-price">${Number(it.lprice).toLocaleString()}원</div>
              <div class="card-mall">${it.mallName}</div>
              <a class="card-link" href="${it.link}" target="_blank" rel="noopener">구매하기</a>
            </div>
          </div>
        `).join('');
      } catch (e) {
        status.textContent = '';
        errorEl.style.display = 'block';
        errorEl.innerHTML = `
          <strong>⚠️ API 연결 실패:</strong> ${e.message}<br>
          <small style="margin-top:6px;display:block">
            Vercel 환경변수 <code>NAVER_CLIENT_ID</code>, <code>NAVER_CLIENT_SECRET</code>가 설정되어 있는지 확인하세요.
          </small>
        `;
      }
    }

    // 페이지 로드 시 자동 검색
    doSearch();
  </script>
</body>
</html>
